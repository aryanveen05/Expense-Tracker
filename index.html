<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <header>
      <h1>Expense Tracker</h1>
      <p class="subtitle">Track where your money goes</p>
    </header>

    <!-- Balance Summary Cards -->
    <div class="summary">
      <div class="card total">
        <span class="label">Total Spent</span>
        <span class="amount" id="totalAmount">₹0</span>
      </div>
      <div class="card income-card">
        <span class="label">Food</span>
        <span class="amount" id="foodTotal">₹0</span>
      </div>
      <div class="card expense-card">
        <span class="label">Transport</span>
        <span class="amount" id="transportTotal">₹0</span>
      </div>
      <div class="card other-card">
        <span class="label">Other</span>
        <span class="amount" id="otherTotal">₹0</span>
      </div>
    </div>

    <!-- Add Expense Form -->
    <div class="form-box">
      <h2>Add Expense</h2>
      <div class="form-row">
        <input type="text" id="expenseName" placeholder="What did you spend on?" />
        <input type="number" id="expenseAmount" placeholder="Amount (₹)" min="1" />
      </div>
      <div class="form-row">
        <select id="expenseCategory">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="expenseDate" />
        <button id="addBtn">Add Expense</button>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <span>Filter:</span>
      <button class="filter-btn active" data-filter="All">All</button>
      <button class="filter-btn" data-filter="Food">Food</button>
      <button class="filter-btn" data-filter="Transport">Transport</button>
      <button class="filter-btn" data-filter="Shopping">Shopping</button>
      <button class="filter-btn" data-filter="Entertainment">Entertainment</button>
      <button class="filter-btn" data-filter="Other">Other</button>
    </div>

    <!-- Expense List -->
    <div class="expense-list" id="expenseList">
      <p class="empty-msg" id="emptyMsg">No expenses yet. Add one above!</p>
    </div>

    <!-- Chart Section -->
    <div class="chart-section">
      <h2>Spending Breakdown</h2>
      <div class="chart-wrapper">
        <canvas id="expenseChart"></canvas>
      </div>
    </div>

  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
